<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #374151; }
      .label { font: bold 16px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 2; rx: 14; }
      .storage { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 14; }
      .compute { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .data { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 14; }
      .ops { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 14; }
      .alert { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 14; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke: #6b7280; stroke-width: 2.5; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>

  <text x="50" y="45" class="title">AWS Serverless File Processing Pipeline Lab</text>
  <text x="50" y="75" class="subtitle">Event-driven S3 upload processing with Lambda, DynamoDB metadata, DLQ failure capture, CloudWatch alarms, and SNS alerts</text>

  <!-- Main success path -->
  <rect x="80" y="160" width="220" height="90" class="box"/>
  <text x="190" y="195" text-anchor="middle" class="label">User / Uploader</text>
  <text x="190" y="220" text-anchor="middle" class="small">Uploads file to S3</text>

  <rect x="380" y="150" width="260" height="110" class="storage"/>
  <text x="510" y="185" text-anchor="middle" class="label">Amazon S3</text>
  <text x="510" y="210" text-anchor="middle" class="small">Private upload bucket</text>
  <text x="510" y="233" text-anchor="middle" class="small">Prefix: uploads/</text>

  <rect x="730" y="150" width="260" height="110" class="compute"/>
  <text x="860" y="185" text-anchor="middle" class="label">AWS Lambda</text>
  <text x="860" y="210" text-anchor="middle" class="small">File metadata processor</text>
  <text x="860" y="233" text-anchor="middle" class="small">Triggered by S3 event</text>

  <rect x="730" y="340" width="260" height="105" class="data"/>
  <text x="860" y="375" text-anchor="middle" class="label">DynamoDB</text>
  <text x="860" y="400" text-anchor="middle" class="small">File metadata table</text>
  <text x="860" y="423" text-anchor="middle" class="small">file_id partition key</text>

  <!-- Logs -->
  <rect x="390" y="340" width="240" height="105" class="ops"/>
  <text x="510" y="375" text-anchor="middle" class="label">CloudWatch Logs</text>
  <text x="510" y="400" text-anchor="middle" class="small">Received event</text>
  <text x="510" y="423" text-anchor="middle" class="small">Wrote metadata item</text>

  <!-- Failure/alert path -->
  <rect x="130" y="535" width="230" height="100" class="alert"/>
  <text x="245" y="570" text-anchor="middle" class="label">SQS DLQ</text>
  <text x="245" y="595" text-anchor="middle" class="small">Failed event capture</text>

  <rect x="485" y="535" width="230" height="100" class="ops"/>
  <text x="600" y="570" text-anchor="middle" class="label">CloudWatch Alarm</text>
  <text x="600" y="595" text-anchor="middle" class="small">DLQ visible messages ≥ 1</text>

  <rect x="840" y="535" width="230" height="100" class="alert"/>
  <text x="955" y="570" text-anchor="middle" class="label">SNS Email Alert</text>
  <text x="955" y="595" text-anchor="middle" class="small">Operational notification</text>

  <!-- IAM -->
  <rect x="80" y="340" width="220" height="105" class="box"/>
  <text x="190" y="375" text-anchor="middle" class="label">IAM Role</text>
  <text x="190" y="400" text-anchor="middle" class="small">Least privilege</text>
  <text x="190" y="423" text-anchor="middle" class="small">S3 read + DDB write</text>

  <!-- Arrows -->
  <line x1="300" y1="205" x2="380" y2="205" class="arrow"/>
  <line x1="640" y1="205" x2="730" y2="205" class="arrow"/>
  <line x1="860" y1="260" x2="860" y2="340" class="arrow"/>
  <line x1="730" y1="392" x2="630" y2="392" class="arrow"/>
  <line x1="300" y1="392" x2="390" y2="392" class="dashed"/>

  <line x1="780" y1="255" x2="245" y2="535" class="dashed"/>
  <line x1="360" y1="585" x2="485" y2="585" class="arrow"/>
  <line x1="715" y1="585" x2="840" y2="585" class="arrow"/>

  <!-- Notes -->
  <rect x="80" y="675" width="990" height="45" class="box"/>
  <text x="575" y="703" text-anchor="middle" class="small">Success path: S3 upload → Lambda → DynamoDB + CloudWatch Logs. Failure path: DLQ message → CloudWatch Alarm → SNS email alert.</text>
</svg>
